services:
  db:
    image: mongo:7.0.12
    container_name: sustenido_mongodb_container
    volumes:
      - ./db:/data/db
    ports:
      - "27018:27017"
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    networks:
      - sustenido-network

  node:
    image: node:20.16.0
    container_name: sustenido_node_api_container
    working_dir: /usr/src/app
    env_file:
      - ./.env
    volumes:
      - ./node:/usr/src/app
      - ./uploads:/usr/src/app/uploads
    ports:
      - "3001:3000"
    command: sh -c "npm install && node index.js"
    environment:
      PYTHON_API_URL: http://python_scraper:8000
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@db:27017/admin
      APP_DATABASE_NAME: ${APP_DATABASE_NAME:-sustenido}

      FRONTEND_BASE_URL: https://sustenido.eloygomes.com
      API_PUBLIC_BASE_URL: https://api.sustenido.eloygomes.com
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APPROVAL_ADMIN_EMAILS: ${APPROVAL_ADMIN_EMAILS}

    depends_on:
      - db
      - python_scraper
    restart: unless-stopped
    networks:
      - sustenido-network

  python_scraper:
    image: python:3.10-slim
    container_name: sustenido_python_scraper_container
    working_dir: /usr/src/app
    volumes:
      - ./python:/usr/src/app
    ports:
      - "8001:8000"
    shm_size: "1gb"
    command: >
      sh -c "apt-get update &&
      apt-get install -y --no-install-recommends chromium chromium-driver libasound2 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc-s1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation xdg-utils &&
      rm -rf /var/lib/apt/lists/* &&
      pip install --no-cache-dir -r requirements.txt &&
      python scrapper.py"
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@db:27017/admin
      CHROME_BINARY: /usr/bin/chromium
      TRUSTED_HOSTS: localhost,127.0.0.1,python_scraper,python_scraper:8000
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - sustenido-network

networks:
  sustenido-network:
    driver: bridge
