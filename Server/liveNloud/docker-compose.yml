services:
  db:
    image: mongo:7.0.12
    container_name: mongodb_container
    volumes:
      - ./db:/data/db
    ports:
      - "27017:27017"
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: REMOVED_MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD: REMOVED_MONGO_PASSWORD
    networks:
      - app-network

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: seudominio.com.br
    env_file:
      - ./mailserver.env
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    volumes:
      - ./mailserver/docker-data/mail-data:/var/mail
      - ./mailserver/docker-data/mail-state:/var/mail-state
      - ./mailserver/docker-data/mail-logs:/var/log/mail
      - ./mailserver/docker-data/config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: unless-stopped
    networks:
      - app-network

  node:
    image: node:20.16.0
    container_name: node_api_container
    working_dir: /usr/src/app
    volumes:
      - ./node:/usr/src/app
      - ./uploads:/usr/src/app/uploads
    ports:
      - "3000:3000"
    command: sh -c "npm install && node index.js"
    environment:
      PYTHON_API_URL: http://python_scraper:8000
      NODE_ENV: production

      ACCESS_SECRET: REMOVED_ACCESS_SECRET
      REFRESH_SECRET: REMOVED_REFRESH_SECRET
      FRONTEND_BASE_URL: https://www.live.eloygomes.com

      SMTP_HOST: mail.eloygomes.com
      SMTP_PORT: 587
      SMTP_USER: no-reply@eloygomes.com
      SMTP_PASS: REMOVED_SMTP_PASS
      SMTP_FROM: Sustenido <no-reply@eloygomes.com>
    depends_on:
      - db
      - python_scraper
      - mailserver
    restart: unless-stopped
    networks:
      - app-network

  python_scraper:
    image: python:3.10-slim
    container_name: python_scraper_container
    working_dir: /usr/src/app
    volumes:
      - ./python:/usr/src/app
    ports:
      - "8000:8000"
    shm_size: "1gb"
    command: >
      sh -c "apt-get update &&
      apt-get install -y --no-install-recommends chromium chromium-driver libasound2 libatk-bridge2.0-0 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc-s1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 ca-certificates fonts-liberation xdg-utils &&
      rm -rf /var/lib/apt/lists/* &&
      pip install --no-cache-dir -r requirements.txt &&
      python scrapper.py"
    environment:
      MONGO_URI: REMOVED_MONGO_URI
      CHROME_BINARY: /usr/bin/chromium
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

  python_socketio:
    image: python:3.10
    container_name: python_socketio_container
    working_dir: /usr/src/app/socketio
    volumes:
      - ./python_socketio:/usr/src/app/socketio
    command: >
      sh -c "pip install --upgrade pip setuptools &&
      pip install -r requirements.txt &&
      sleep 15 &&
      python tuner.py"
    environment:
      NODEJS_URL: http://node:3000/python
    depends_on:
      - node
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
