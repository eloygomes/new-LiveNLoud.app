services:
  admin-sustenido:
    build:
      context: .
      target: admin-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - admin-api
    ports:
      - "127.0.0.1:5175:5175"
    networks:
      - admin-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 5175
      NODE_ENV: production
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-adminPanel}
      TARGET_DB_NAME: ${TARGET_DB_NAME:-sustenido}
      ADMIN_DATA_API_URL: http://admin-api:5185
      ACCESS_SECRET: ${ADMIN_ACCESS_SECRET}
      REFRESH_SECRET: ${ADMIN_REFRESH_SECRET}
      ADMIN_PUBLIC_ORIGIN: https://admin.sustenido.eloygomes.com
      FRONTEND_BASE_URL: https://sustenido.eloygomes.com

  admin-api:
    build:
      context: .
      target: admin-api
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - admin-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-adminPanel}
      TARGET_DB_NAME: ${TARGET_DB_NAME:-sustenido}
      TARGET_MONGO_TIMEOUT_MS: ${TARGET_MONGO_TIMEOUT_MS:-5000}

networks:
  admin-network:
