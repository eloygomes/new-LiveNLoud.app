services:
  admin-db:
    image: mongo:7.0.12
    restart: unless-stopped
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${ADMIN_MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${ADMIN_MONGO_ROOT_PASSWORD}
    volumes:
      - admin-db-data:/data/db
    networks:
      - admin-network

  admin-sustenido:
    build:
      context: .
      target: admin-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - admin-db
      - admin-api
    ports:
      - "127.0.0.1:5175:5175"
    networks:
      - admin-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 5175
      NODE_ENV: production
      ADMIN_MONGO_URI: mongodb://${ADMIN_MONGO_ROOT_USER}:${ADMIN_MONGO_ROOT_PASSWORD}@admin-db:27017/admin
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-adminPanel}
      TARGET_MONGO_URI: ${SUSTENIDO_MONGO_URI}
      TARGET_DB_NAME: ${TARGET_DB_NAME:-sustenido}
      ADMIN_DATA_API_URL: http://admin-api:5185
      ACCESS_SECRET: ${ADMIN_ACCESS_SECRET}
      REFRESH_SECRET: ${ADMIN_REFRESH_SECRET}
      ADMIN_PUBLIC_ORIGIN: https://admin.sustenido.eloygomes.com
      FRONTEND_BASE_URL: https://sustenido.eloygomes.com

  admin-api:
    build:
      context: .
      target: admin-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - admin-db
    networks:
      - admin-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ADMIN_MONGO_URI: mongodb://${ADMIN_MONGO_ROOT_USER}:${ADMIN_MONGO_ROOT_PASSWORD}@admin-db:27017/admin
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-adminPanel}
      TARGET_MONGO_URI: ${SUSTENIDO_MONGO_URI}
      TARGET_DB_NAME: ${TARGET_DB_NAME:-sustenido}
      TARGET_MONGO_TIMEOUT_MS: ${TARGET_MONGO_TIMEOUT_MS:-5000}

networks:
  admin-network:

volumes:
  admin-db-data:
