services:
  docs-sustenido:
    image: ${DOCS_IMAGE:-docs-sustenido:local}
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      DOCS_INTERNAL_USER: ${DOCS_INTERNAL_USER:?defina DOCS_INTERNAL_USER}
      DOCS_INTERNAL_PASSWORD: ${DOCS_INTERNAL_PASSWORD:?defina DOCS_INTERNAL_PASSWORD}
    expose:
      - "4321"
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - docs-proxy

networks:
  docs-proxy:
    name: sustenido-docs-proxy
    internal: true
