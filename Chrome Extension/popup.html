<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#Sustenido Quick Add</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="brand-bar">
        <div class="brand-mark" aria-hidden="true">#</div>
        <div>
          <p class="eyebrow">#Sustenido</p>
          <h1>QUICK ADD</h1>
        </div>
      </header>

      <section id="statusCard" class="neumorphism status-card">
        <span class="status-dot" aria-hidden="true"></span>
        <p id="statusText">Carregando extensão...</p>
      </section>

      <section id="unavailableView" class="state-view hidden">
        <div class="neumorphism state-card">
          <div class="state-icon" aria-hidden="true">#</div>
          <h2>Extensão não disponivel para esse site</h2>
        </div>
      </section>

      <section id="loginView" class="state-view hidden">
        <div class="neumorphism state-card">
          <div class="section-title">
            <p class="eyebrow accent">LOGIN</p>
            <!-- <h2>#Sustenido</h2> -->
          </div>

          <form id="loginForm" class="form-stack">
            <label class="field">
              <span>Email</span>
              <input id="emailInput" type="email" autocomplete="username" placeholder="you@email.com" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Your password" required />
            </label>
            <label class="checkbox-field">
              <input id="rememberSessionInput" type="checkbox" />
              <span>Stay connected</span>
            </label>
            <button id="loginButton" class="primary-button" type="submit">LOGIN</button>
          </form>
        </div>
      </section>

      <section id="songView" class="state-view hidden">
        <div id="compatibilityNotice" class="notice hidden"></div>

        <div id="songContent" class="song-content">
          <section class="neumorphism summary-card">
            <div>
              <p class="eyebrow accent">ADD SONG</p>
              <h2 id="songValue"></h2>
              <p id="artistValue" class="summary-artist"></p>
            </div>
            <button id="copyLinkButton" class="icon-button" type="button" aria-label="Copy source link">↗</button>
          </section>

          <section class="neumorphism form-card">
            <button class="source-row" type="button" id="copyLinkButtonProxy">
              <span>
                <small>Source Link</small>
                <strong id="linkValue"></strong>
              </span>
              <b aria-hidden="true">⧉</b>
            </button>

            <div class="details-grid">
              <div class="mini-card">
                <small>Capo</small>
                <h4 id="capoValue"></h4>
              </div>
              <div class="mini-card">
                <small>Tom</small>
                <h4 id="tomValue"></h4>
              </div>
              <div class="mini-card">
                <small>Tuning</small>
                <h4 id="tunerValue"></h4>
              </div>
            </div>

            <label class="field instrument-field">
              <span>Instrument</span>
              <select id="instrumentSelect">
                <option value="guitar01">Guitar 01</option>
                <option value="guitar02">Guitar 02</option>
                <option value="bass">Bass</option>
                <option value="keys">Keys</option>
                <option value="drums">Drums</option>
                <option value="voice">Voice</option>
              </select>
            </label>

            <label class="field progress-field">
              <span>Progress <strong id="progressValue">0%</strong></span>
              <input id="progressInput" type="range" min="0" max="100" step="5" value="0" />
            </label>

            <label class="field">
              <span>Video links</span>
              <textarea id="videosInput" rows="3" placeholder="Paste video links"></textarea>
            </label>

            <div class="field">
              <span>Tags</span>
              <div id="setlistTags" class="setlist-tags"></div>
            </div>

            <div class="actions">
              <button id="discardButton" class="ghost-button" type="button">DISCARD</button>
              <button id="saveButton" class="primary-button" type="button">ADD</button>
            </div>
          </section>
        </div>

        <footer class="session-bar">
          <p><span>Connected as</span><strong id="userBadge"></strong></p>
          <button id="logoutButton" class="ghost-button compact-button" type="button">Logout</button>
        </footer>
      </section>

      <section id="successView" class="state-view hidden">
        <div class="neumorphism state-card">
          <div class="state-icon success" aria-hidden="true">✓</div>
          <h2 id="finalMessage">Cifra adicionada com sucesso</h2>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
